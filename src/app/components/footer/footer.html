<footer class="footer">
  <div class="wrapper">
    <div class="footer__wrapper">
      <h2>Контакты</h2>
      <h3>Мои социальные сети</h3>
      <div class="footer__list">
        <a
          class="footer__social"
          [href]="environment.contacts.instagram"
          target="_blank"
          aria-label="Instagram Эльмиры"
          rel="noopener noreferrer"
          appTrackClick="instagram_contacts_click"
          [eventParams]="{ placement: 'footer' }"
        >
          <app-icon icon="simple-icons:instagram"></app-icon>
        </a>
        <a
          class="footer__social"
          [href]="environment.contacts.vk"
          target="_blank"
          aria-label="VK Эльмиры"
          rel="noopener noreferrer"
          appTrackClick="vk_contacts_click"
          [eventParams]="{ placement: 'footer' }"
        >
          <app-icon icon="simple-icons:vk"></app-icon>
        </a>
        <a
          class="footer__social"
          [href]="environment.contacts.tiktok"
          target="_blank"
          aria-label="TikTok Эльмиры"
          rel="noopener noreferrer"
          appTrackClick="tiktok_contacts_click"
          [eventParams]="{ placement: 'footer' }"
        >
          <app-icon icon="simple-icons:tiktok"></app-icon>
        </a>
        <a
          class="footer__social"
          [href]="environment.contacts.tg"
          target="_blank"
          aria-label="Telegram Эльмиры"
          rel="noopener noreferrer"
          appTrackClick="telegram_contacts_click"
          [eventParams]="{ placement: 'footer' }"
        >
          <app-icon icon="simple-icons:telegram"></app-icon>
        </a>
      </div>
    </div>
  </div>
</footer>
